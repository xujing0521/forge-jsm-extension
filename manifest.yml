modules:
  jiraServiceManagement:portalRequestCreatePropertyPanel:
    - key: jsm-test-hello-world-portal-request-create-property-panel
      resource: main
      resolver:
        function: resolver
      viewportSize: small
      unlicensedAccess:
        - anonymous
        - unlicensed
        - customer
  jiraServiceManagement:portalRequestDetail:
    - key: jsm-test-detail-hello-world-panel
      resource: detail
      resolver:
        function: resolver
      viewportSize: medium
      title: jsm-test-detail
  jiraServiceManagement:portalFooter:
    - key: jsm-footer
      resource: footer/entry
      resolver:
        function: resolver-2
      viewportSize: medium
      unlicensedAccess:
        - anonymous
        - unlicensed
        - customer
  jiraServiceManagement:assetsImportType:
    - key: jsm-assets-import-ait
      resource: assets-import/entry
      resolver:
        function: resolver-3
      render: native
      title: JSM Assets Import
      description: Import devices from external sources into Assets via Forge.
      icon: https://developer.atlassian.com/platform/forge/images/icons/issue-panel-icon.svg
      onDeleteImport:
        function: resolver-4
      startImport:
        function: resolver-5
      stopImport:
        function: resolver-6
      importStatus:
        function: resolver-7
  consumer:
    - key: jsm-assets-import-worker
      queue: worker-queue
      resolver:
        function: resolver-8
        method: worker-queue-listener
    - key: jsm-assets-import-controller
      queue: controller-queue
      resolver:
        function: resolver-9
        method: controller-queue-listener
  function:
    - key: resolver
      handler: index.handler
    - key: resolver-2
      handler: jsm-footer.handler
    - key: resolver-3
      handler: jsm-assets-import.handler
    - key: resolver-4
      handler: jsm-assets-import.onDeleteImport
    - key: resolver-5
      handler: jsm-assets-import.startImport
    - key: resolver-6
      handler: jsm-assets-import.stopImport
    - key: resolver-7
      handler: jsm-assets-import.importStatus
    - key: resolver-8
      handler: jsm-assets-import.workerQueueHandler
      timeoutSeconds: 900
    - key: resolver-9
      handler: jsm-assets-import.controllerQueueHandler
      timeoutSeconds: 900
permissions:
  scopes:
    - read:jira-user
    - read:jira-work
    - storage:app
    - import:import-configuration:cmdb
  content:
    styles:
      - unsafe-inline
resources:
  - key: main
    path: static/hello-world/build
  - key: detail
    path: static/detail/build
  - key: footer
    path: static/footer/build
    entry:
      entry: jsm-footer.html
  - key: assets-import
    path: src/frontend/assets-import
    entry:
      entry: jsm-assets-import.jsx
app:
  runtime:
    name: nodejs24.x
    memoryMB: 256
    architecture: arm64
  id: ari:cloud:ecosystem::app/9be149ab-66a9-4529-a21d-63a363a61a62
