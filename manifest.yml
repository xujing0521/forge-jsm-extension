modules:
  jiraServiceManagement:portalRequestCreatePropertyPanel:
    - key: jsm-test-hello-world-portal-request-create-property-panel
      resource: main
      resolver:
        function: resolver
      viewportSize: small
      unlicensedAccess:
        - anonymous
        - unlicensed
        - customer
  jiraServiceManagement:portalRequestDetail:
    - key: jsm-test-detail-hello-world-panel
      resource: detail
      resolver:
        function: resolver
      viewportSize: medium
      title: jsm-test-detail
  jiraServiceManagement:portalFooter:
    - key: jsm-footer
      resource: footer/entry
      resolver:
        function: resolver-2
      viewportSize: medium
      unlicensedAccess:
        - anonymous
        - unlicensed
        - customer
  jiraServiceManagement:assetsImportType:
    - key: jsm-assets-import-ait
      resource: assets-import/entry
      resolver:
        function: resolver-3
      render: native
      title: JSM Assets Import
      description: Import devices from external sources into Assets via Forge.
      icon: https://developer.atlassian.com/platform/forge/images/icons/issue-panel-icon.svg
      onDeleteImport:
        function: resolver-4
      startImport:
        function: resolver-5
      stopImport:
        function: resolver-6
      importStatus:
        function: resolver-7
  consumer:
    - key: jsm-assets-import-worker
      queue: worker-queue
      resolver:
        function: resolver-8
        method: worker-queue-listener
    - key: jsm-assets-import-controller
      queue: controller-queue
      resolver:
        function: resolver-9
        method: controller-queue-listener
  jiraServiceManagement:organizationPanel:
    - key: jsm-org-panel
      resource: others/entry
      resolver:
        function: resolver
      viewportSize: medium
      title: JSM ORG PANEL
  jiraServiceManagement:queuePage:
    - key: jsm-queue-page
      resource: others/entry
      resolver:
        function: resolver
      title: JSM QUEUE PAGE
  jiraServiceManagement:portalHeader:
    - key: jsm-portal-footer
      resource: others/entry
      resolver:
        function: resolver
      viewportSize: medium
  jiraServiceManagement:portalProfilePanel:
    - key: jsm-portal-profile-panel
      resource: others/entry
      resolver:
        function: resolver
      viewportSize: medium
      title: PROFILE PANEL
  jiraServiceManagement:portalRequestDetailPanel:
    - key: jsm-request-detail-panel
      resource: others/entry
      resolver:
        function: resolver
      viewportSize: medium
      title: REQUEST DETAIL PANEL
  jiraServiceManagement:portalRequestViewAction:
    - key: jsm-request-view-action
      resource: others/entry-2
      resolver:
        function: resolver
      viewportSize: medium
      title: REQUEST-VIEW-ACTION
      icon: https://developer.atlassian.com/platform/forge/images/issue-panel-icon.svg
  jiraServiceManagement:portalSubheader:
    - key: jsm-portal-subheader
      resource: others/entry
      resolver:
        function: resolver
      viewportSize: medium
  jiraServiceManagement:portalUserMenuAction:
    - key: jsm-portal-user-menu-action
      resource: others/entry-2
      resolver:
        function: resolver
      viewportSize: medium
      title: USER MENU ACTION
  jira:customField:
    - key: jira-custom-field
      name: CUSTOM FIELD
      description: A hello world custom field.
      type: string
      view:
        render: native
        resource: custom-field/entry
        experience:
          - issue-view
          - portal-view
      edit:
        resource: custom-field/entry-2
        render: native
        isInline: true
        experience:
          - issue-create
          - issue-transition
          - issue-view
          - portal-request
      unlicensedAccess:
        - customer
        - unlicensed
        - anonymous
  jira:customFieldType:
    - key: jira-custom-field-type
      name: CUSTOM FIELD TYPE
      description: A hello world custom field.
      type: string
      view:
        render: native
        resource: custom-field-type/entry
        experience:
          - issue-view
          - portal-view
      edit:
        resource: custom-field-type/entry-2
        render: native
        isInline: true
        experience:
          - issue-create
          - issue-transition
          - issue-view
          - portal-request
        validation:
          expression: value == null || !!value.match(configuration?.regex || "^[A-Za-z]+$")
          errorMessage: The value is invalid
      contextConfig:
        resource: custom-field-type/entry-3
        layout: basic
        render: native
      unlicensedAccess:
        - customer
        - unlicensed
        - anonymous
  jira:uiModifications:
    - key: jira-ui-modifications
      title: UI MODIFICATIONS
      resource: ui-modifications/entry
      unlicensedAccess:
        - customer
        - unlicensed
        - anonymous
  trigger:
    - key: jira-ui-modifications-install
      function: resolver-10
      events:
        - avi:forge:installed:app
  function:
    - key: resolver
      handler: index.handler
    - key: resolver-2
      handler: jsm-footer.handler
    - key: resolver-3
      handler: jsm-assets-import.handler
    - key: resolver-4
      handler: jsm-assets-import.onDeleteImport
    - key: resolver-5
      handler: jsm-assets-import.startImport
    - key: resolver-6
      handler: jsm-assets-import.stopImport
    - key: resolver-7
      handler: jsm-assets-import.importStatus
    - key: resolver-8
      handler: jsm-assets-import.workerQueueHandler
      timeoutSeconds: 900
    - key: resolver-9
      handler: jsm-assets-import.controllerQueueHandler
    - key: resolver-10
      handler: jira-ui-modifications.run
permissions:
  scopes:
    - read:jira-user
    - read:jira-work
    - storage:app
    - import:import-configuration:cmdb
    - manage:jira-configuration
    - write:jira-work
  content:
    styles:
      - unsafe-inline
resources:
  - key: main
    path: static/hello-world/build
  - key: detail
    path: static/detail/build
  - key: footer
    path: static/footer/build
    entry:
      entry: jsm-footer.html
  - key: assets-import
    path: src/frontend/assets-import
    entry:
      entry: jsm-assets-import.jsx
  - key: others
    path: static/others/build
    entry:
      entry: jsm-org-panel.html
      entry-2: jsm-request-view-action.html
  - key: custom-field
    path: src/frontend/custom-field
    entry:
      entry: jira-custom-field-main.jsx
      entry-2: jira-custom-field-edit.jsx
  - key: custom-field-type
    path: src/frontend/custom-field-type
    entry:
      entry: jira-custom-field-type-main.jsx
      entry-2: jira-custom-field-type-edit.jsx
      entry-3: jira-custom-field-type-config.jsx
  - key: ui-modifications
    path: static/ui-modifications/build
    entry:
      entry: jira-ui-modifications.html
app:
  runtime:
    name: nodejs24.x
    memoryMB: 256
    architecture: arm64
  id: ari:cloud:ecosystem::app/9be149ab-66a9-4529-a21d-63a363a61a62
